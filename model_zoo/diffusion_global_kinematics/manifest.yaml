# Manifest for the curated *kinematics-conditioned* generative Mode B path planner.
# Schema mirrors nav2_diffusion_models/manifests/example_diffusion_local.yaml
# (docs/architecture.md section 5.4). Reproduce the artifact with export.py.

model_name: diffusion_global_costmap_kinematics_v0
model_family: attnseq              # same no-fan cross-attn autoregressive net; kinematics-conditioned data

# Conditioning the model consumes (Mode B PathModel ONNX contract).
input_modalities:
  - local_costmap                  # goal-aligned 24x24 patch, normalized [0,1]
  - local_goal                     # [goal distance, min turn radius R; R=0 => omni]

output_type: path_candidates       # K start->goal global path proposals
frame_convention: map              # candidates rotated back into the map frame by the C++ backend
horizon: n/a                       # global path, not a timed trajectory
robot_kinematics: conditioned      # the SAME model serves several steering geometries via R

io_contract:
  inputs:
    context: [1, 2]                # [goal_distance, min_turn_radius_R]
    costmap: [1, 1, 24, 24]
  output:
    paths: [1, 5, 12, 2]
  patch_window:
    forward_m: 6.0
    half_width_m: 3.0

runtime: onnx
precision: fp32

architecture:
  type: attnseq_autoregressive
  note: >
    Same network as diffusion_global_costmap_attnseq_v0 (cross-attention perception
    tokenizer + per-step cross-attention GRU decoder + K learned seeds, no lateral fan).
    The novelty is the conditioning: the previously-unused second context slot carries
    the vehicle min turn radius R, so one model produces R-appropriate paths.

training_data:
  datasets:
    - name: synthetic_kinematics_conditioned
      source: sim                  # procedural: all 8 courses (clear/centred/double-gate straight + off-centre/far gap + side R-shaped + omni-only slalom)
      fraction: 1.0
  robot_types:
    - omni_directional             # R=0 (no turn-radius limit; threads slalom)
    - differential_drive           # small R (tight detours)
    - ackermann                    # large R (gentle detours)
    - generic
  notes: >
    Fully synthetic (make_costmap_path_kinematics_dataset). Each maneuver's lateral
    detour is a Gaussian whose width w=sqrt(2*off*R) sets peak curvature ~ 1/R, with R
    sampled over 0.0 (omni) .. 1.5 m. Covers all eight benchmark courses: clear / centred
    / double gate (straight, R-invariant), off-centre & far off-centre gap and side
    obstacle (R-shaped), and an omni-only slalom block (the benchmark slalom's +/-2 m
    crossings in a ~1.6 m gap need curvature ~1/0.02 m, past any wheeled turning circle).
    Deployment-matched patches (_resampled_aligned_patch). NO real-robot or rosbag data.

# Behavioural check, not the full Nav2 benchmark suite (research placeholder).
benchmark_results:
  passed: true
  suite: footprint+curvature-validated planner_benchmark, pure generative (no fallback), all 8 courses
  conditions_on_min_turn_radius: true   # same gap, smaller R -> sharper path (monotonic peak curvature)
  curvature_validator_disposes_infeasible: true  # Ackermann (R=1.5) disposed on every lateral-maneuver course
  success_by_vehicle:
    omni_R0: "8/8 (threads all courses incl. slalom; curvature validator off)"
    diff_R0_3: "8/8 (sharp turning circle clears every lateral maneuver; coarse 12-pose slalom S stays under its 1/0.3 gate)"
    ackermann_R1_5: "3/8 (clear, centred gap, double gate) — disposed on narrow gap / off-centre / far / slalom / side obstacle"
  note: >
    One model, three vehicles, same weights — only the R input and the curvature gate
    differ. omni (R=0, gate off) threads all eight courses including the S-shaped slalom.
    diff (R=0.3) threads all eight: its sharp turning circle clears the off-centre / far /
    side lateral maneuvers, and the benchmark slalom's coarse 12-pose S stays under its
    1/0.3 = 3.33 gate. Ackermann (R=1.5, gate 1/R = 0.67) threads only the near-straight
    courses (clear, centred gap, double gate); the curvature validator disposes every
    course that needs a real lateral move — narrow gap (aim correction ~1.5), off-centre /
    far gap (2 m jog), side obstacle (~2.2 bow), slalom — all past a 1.5 m turning circle.
    Peak output curvature is monotonic in the commanded R. Verified in the real C++
    planner_benchmark; see docs/generative_limits.md and docs/planner_comparison.md.
  collision_count: 0

limitations:
  - "Synthetic training data only — NOT validated on any real robot or rosbag."
  - "Covers all eight benchmark courses conditioned on R; slalom is feasible (and trained) for omni (R=0) only — a wheeled R cannot turn tight enough for the benchmark slalom, and the curvature validator correctly disposes it for diff / Ackermann."
  - "R demonstrated over 0.0 (omni) .. 1.5 m; the curvature validator is the authority on feasibility, not the model."
  - "Research / demonstration model. Do not deploy on hardware; the validity layer is the authority."

license:
  model: Apache-2.0
  data: Apache-2.0
  code: Apache-2.0

checksum:
  algorithm: sha256
  value: "f89264f59caab94a827884adb20f3b9b4897df1c1fb2455ffe61cad065feaaf1"
  artifact: costmap_kinematics.onnx

reproduce:
  command: "PYTHONPATH=../../generative/nav2_diffusion_training python3 export.py  # GPU if available; CUDA_VISIBLE_DEVICES= forces CPU"
  toolchain: "torch 2.10.0+cu128, onnx 1.21.0; trained on CUDA, exported on CPU"
  hyperparameters: "attnseq (dim 64 / 8 heads), dataset 'kinematics' (all courses + omni), 500 samples, 3500 epochs, lr 0.004 cosine, grad-clip 1.0, best-checkpoint"
  seed: 0
  note: "GPU training is not bit-exact run-to-run; the committed artifact conditions on R and is disposed by the curvature validator on the off-centre gaps for Ackermann (verified). A re-export reproduces the R-conditioning trend."
