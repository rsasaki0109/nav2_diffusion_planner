# Manifest for the curated generative LOCAL trajectory model: the *obstacle-threading*
# Mode A (local controller) model — the costmap-token transformer DAgger-trained on a
# corrected reactive dodge oracle, run with the controller's windowed footprint gate.
# Schema mirrors nav2_diffusion_models/manifests/example_diffusion_local.yaml. Reproduce
# the artifact with export.py.

model_name: diffusion_local_costmap_threading_v0
model_family: transformer          # DETR-style set prediction; DAgger closed-loop trained

input_modalities:
  - local_costmap                  # egocentric 32x32 patch, normalized [0,1]
  - local_goal                     # carrot in the robot base frame
  - speed_limits                   # desired linear speed + max angular speed

output_type: trajectory_candidates # K base-frame SE(2) trajectories
frame_convention: base_link
horizon: 1.0                       # seconds (10 steps x 0.1 s)
robot_kinematics: diff             # unicycle / differential drive

io_contract:
  inputs:
    context: [1, 4]                # [goal_x, goal_y, linear_speed, max_angular_speed]
    costmap: [1, 1, 32, 32]        # egocentric; cropEgocentricPatch maps col 0 -> +y (left)
  output:
    trajectories: [1, 3, 10, 3]    # (x, y, yaw) in the base frame
  patch:
    size: 32

architecture:
  type: transformer_set_prediction
  note: >
    Same CostmapTransformerPlanner as diffusion_local_costmap_transformer_v0 (strided-conv
    costmap tokenizer + context token; K=3 learned query tokens cross-attend through 2
    decoder blocks). The difference is the TRAINING: DAgger (dataset aggregation) in a
    numpy costmap closed-loop sim, relabelled by a corrected reactive dodge oracle, so the
    policy learns the right action on the states it actually reaches. The small
    CNN-embedding flow model cannot fit the sharp dodge (stays at 1/4); capacity matters.

training_data:
  datasets:
    - name: dagger_closed_loop_corrected_oracle
      source: sim                  # procedural numpy costmap rollouts + reactive dodge oracle
      fraction: 1.0
  robot_types:
    - differential_drive
  notes: >
    DAgger (nav2_diffusion_training.dagger.dagger_train_costmap_transformer): roll the
    current policy out in the costmap sim over open / frontal (dead-ahead) / side / side2 /
    two / corridor (two-walled, off-centre start) scenarios, relabel each visited state with
    the corrected reactive dodge oracle (a *sustained* committed lateral offset to the free
    side, held until the block is passed; a corridor's free centre-line is left to the
    carrot to centre through), aggregate and retrain. NO real-robot or rosbag data. The
    oracle replaces the shipped one, which collided / stalled in closed loop (a 0.20 m
    transient bow + on-line carrot, and a dead-ahead block it could not thread).

# Behavioural / closed-loop checks (not the full Nav2 stack).
benchmark_results:
  passed: true
  suite: controller_benchmark (real C++, live costmap) + DAgger closed-loop sim
  closed_loop_sim: "5/6 scenarios (open/frontal/side/side2/corridor) with safety_check_points=3 and costmap_patch_resolution=0.08"
  controller_benchmark_real: >
    First learned Mode A controller here to thread ALL three obstacle courses purely
    generatively (no fallback): REACHES the goal on the *frontal* dead-ahead block (4.24 m,
    0.48 m clearance), the *side obstacle* (4.05 m traverse where learned/transformer/recurrent
    stall at ~1.0 m), AND the *corridor* (off-centre start, two walls) where it even centres
    better than the classical baselines (mean |y-centre| 0.203 m vs VFH+ 0.277 / ND 0.307).
    The frontal block was the prior holdout: sensed only ~0.8 m ahead it forced a violent late
    dodge the small model underfit and the progress-greedy selector defeated; widening the
    egocentric-patch field of view (costmap_patch_resolution=0.08, +-1.24 m vs +-0.775 m) lets
    the model see it ~1.6x earlier and commit a gentle dodge in time. Must run with the windowed
    footprint gate (safety_check_points) AND the matching patch resolution. The hybrid (VFH+
    fallback) remains the completeness guarantee for novel scenes. See docs/generative_limits.md
    and docs/controller_comparison.md.
  collision_count: 0

limitations:
  - "Synthetic training data only — NOT validated on any real robot or rosbag."
  - "Threads ALL three obstacle courses generatively in the real benchmark — frontal (dead-ahead), side, and corridor (centring better than VFH+/ND) — but on novel scenes outside its synthetic distribution the hybrid fallback remains the completeness guarantee. The sim-only two-block slalom is still a closed-loop miss."
  - "Requires the controller's windowed footprint gate (safety_check_points>0) AND the matching widened patch resolution (costmap_patch_resolution=0.08); under the default full-horizon gate / native 0.05 m patch it is hard-rejected / stalls on the frontal block like the others."
  - "Research / demonstration model. Do not deploy on hardware; the safety layer is the authority."

license:
  model: Apache-2.0
  data: Apache-2.0
  code: Apache-2.0

checksum:
  algorithm: sha256
  value: "c73ebeb5f9a81e60492f480e4198a48890e4d8f29ba7eab94a948321e1c2423e"
  artifact: costmap_threading.onnx

reproduce:
  command: "PYTHONPATH=../../generative/nav2_diffusion_training python3 export.py  # CUDA_VISIBLE_DEVICES= forces CPU"
  toolchain: "torch 2.10.0+cu128, onnx 1.21.0; trained on CUDA, exported on CPU"
  hyperparameters: "CostmapTransformerPlanner; DAgger iters 8, base 320, epochs 900, lr 0.003 cosine, grad-clip 1.0, best-checkpoint; SAFETY_WINDOW 3"
  seed: 0
  note: "DAgger + GPU training is not bit-exact run-to-run; a re-export reproduces the threading behaviour (frontal, side obstacle and corridor all reached in the real controller_benchmark with safety_check_points=3 and costmap_patch_resolution=0.08)."
